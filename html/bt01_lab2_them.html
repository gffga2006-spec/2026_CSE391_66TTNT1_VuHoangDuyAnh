<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style1.css">
</head>
<body>
    <div class="khung-chinh">

        <h1 class="tieu-de"> Get in touch with us by filling contact form below </h1>

        <form class="nhap-thong-tin">

            <div class="hang">
                <input type="name" class="nua" placeholder="* Enter your full name">
                <input type="email" class="nua" placeholder="* Enter your email address"> 
            </div>

             <div class="hang2">
                <input type="text" class="full" placeholder="Enter your subject">
            </div>

            <div class="hang3">
                <textarea class="area" placeholder="* Your message here..."></textarea>
            </div>

            <div class="hang4">
                <button type="submit" class="nut-gui">Send message</button>
                <span class="ghi-chu">
                    * Please fill all required form field, thanks!
                </span>
            </div>

        </form>

    </div>
</body>
</html>
